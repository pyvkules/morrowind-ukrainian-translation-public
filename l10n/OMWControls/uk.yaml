ControlsPage: "Керування OpenMW"
ControlsPageDescription: "Додаткові налаштування керування гравцем."

MovementSettings: "Рух"

alwaysRun: "Завжди бігти"
alwaysRunDescription: |
    Якщо ввімкнено, персонаж типово бігає, інакше — ходить.
    Клавіша Shift тимчасово інвертує це налаштування, а Caps Lock інвертує його, поки натиснутий.

toggleSneak: "Перемикання крадькості"
toggleSneakDescription: |
    Клавіша крадькості (типово Ctrl) перемикає режим замість того, щоб її утримувати.
    Гравцям, які багато часу крадуться, з цією опцією може бути зручніше.

smoothControllerMovement: "Плавний рух зі стіка"
smoothControllerMovementDescription: |
   Вмикає плавний рух стіком контролера. Перехід від ходьби до бігу стає менш різким.

TogglePOV_name: "Перемкнути вид"
TogglePOV_description: "Перемикання між видом від першої та третьої особи. Утримуйте для режиму огляду."

Zoom3rdPerson_name: "Наблизити/віддалити"
Zoom3rdPerson_description: "Наближає або віддаляє камеру у виді від третьої особи."

MoveForward_name: "Рух вперед"
MoveForward_description: "Взаємно скасовується з рухом назад."

MoveBackward_name: "Рух назад"
MoveBackward_description: "Взаємно скасовується з рухом вперед."

MoveLeft_name: "Рух вліво"
MoveLeft_description: "Взаємно скасовується з рухом вправо."

MoveRight_name: "Рух вправо"
MoveRight_description: "Взаємно скасовується з рухом вліво."

Use_name: "Використати"
Use_description: "Атака зброєю або чарування закляття залежно від поточної стійки."

Run_name: "Біг"
Run_description: "Утримуйте, щоб бігти або йти, залежно від налаштування \"Завжди бігти\"."

AlwaysRun_name: "Завжди бігти"
AlwaysRun_description: "Перемкнути налаштування \"Завжди бігти\"."

Jump_name: "Стрибок"
Jump_description: "Стрибайте, коли ви на землі."

AutoMove_name: "Автобіг"
AutoMove_description: "Перемкнути безперервний рух уперед."

Sneak_name: "Крастися"
Sneak_description: "Утримуйте, щоб крастися, якщо перемикання крадькості вимкнено."

ToggleSneak_name: "Перемкнути крадькість"
ToggleSneak_description: "Перемикає крадькість, якщо ввімкнено перемикання крадькості."

ToggleWeapon_name: "Приготувати зброю"
ToggleWeapon_description: "Увійти в бойову стійку або вийти з неї."

ToggleSpell_name: "Приготувати магію"
ToggleSpell_description: "Увійти в магічну стійку або вийти з неї."

Inventory_name: "Інвентар"
Inventory_description: "Відкрити інвентар."

Journal_name: "Журнал"
Journal_description: "Відкрити журнал."

QuickKeysMenu_name: "Швидке меню"
QuickKeysMenu_description: "Відкрити меню швидких клавіш."

SmoothMoveForward_name: "Плавний рух вперед"
SmoothMoveForward_description: "Рух уперед із плавними переходами між ходьбою та бігом."

SmoothMoveBackward_name: "Плавний рух назад"
SmoothMoveBackward_description: "Рух назад із плавними переходами між ходьбою та бігом."

SmoothMoveLeft_name: "Плавний рух вліво"
SmoothMoveLeft_description: "Рух вліво з плавними переходами між ходьбою та бігом."

SmoothMoveRight_name: "Плавний рух вправо"
