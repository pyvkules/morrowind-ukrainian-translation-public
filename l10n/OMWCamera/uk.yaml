Camera: "Камера OpenMW"
settingsPageDescription: "Налаштування камери OpenMW."

thirdPersonSettings: "Вид від третьої особи"

viewOverShoulder: "Вид через плече"
viewOverShoulderDescription: |
    Керує режимом виду від третьої особи.
      Ні: вид центрується на голові персонажа. Приціл приховано.
      Так: коли зброя в піхвах, камера розташована за плечем персонажа, приціл завжди видно.

shoulderOffsetX: "Горизонтальний зсув виду через плече"
shoulderOffsetXDescription: >
    Горизонтальний зсув виду через плече.
    Для лівого плеча використовуйте від'ємне значення.

shoulderOffsetY: "Вертикальний зсув виду через плече"
shoulderOffsetYDescription: >
    Вертикальний зсув виду через плече.

autoSwitchShoulder: "Автоматична зміна плеча"
autoSwitchShoulderDescription: >
    Коли перешкоди штовхають камеру близько до персонажа гравця,
    це налаштування автоматично перемикає камеру на плече, віддаленіше від перешкод.

zoomOutWhenMoveCoef: "Коефіцієнт віддалення під час руху"
zoomOutWhenMoveCoefDescription: >
    Віддаляє камеру (додатне значення) або наближає її (від'ємне значення), поки персонаж рухається.
    Працює лише з увімкненим видом через плече. Нуль вимикає ефект (типово: 20.0).

previewIfStandStill: "Огляд у нерухомості"
previewIfStandStillDescription: >
    Персонаж гравця не повертається в бік камери, поки стоїть без діла зі зброєю в піхвах.

deferredPreviewRotation: "Відкладений поворот після огляду"
deferredPreviewRotationDescription: |
    Якщо ввімкнено, персонаж плавно повертається в напрямку погляду після виходу з режиму огляду.
    Якщо вимкнено, повертається камера, а не персонаж.

ignoreNC: "Ігнорувати прапорець 'No Collision'"
ignoreNCDescription: >
    Не дає камері проходити крізь об'єкти, у яких в NIF-моделі ввімкнено прапорець NC (без зіткнень).

move360: "Рух 360"
move360Description: >
    Робить напрямок руху незалежним від напрямку камери, поки зброя персонажа в піхвах.
    Наприклад, біжачи назад, персонаж дивитиметься в камеру.

move360TurnSpeed: "Швидкість повороту для Рух 360"
move360TurnSpeedDescription: "Множник швидкості повороту (типово: 5.0)."

slowViewChange: "Плавна зміна виду"
slowViewChangeDescription: "Робить перехід від першої до третьої особи не миттєвим."

povAutoSwitch: "Автоперемикання на першу особу"
povAutoSwitchDescription: "Автоматично перемикатися на вид від першої особи, якщо одразу за гравцем є перешкода."


headBobbingSettings: "Похитування голови від першої особи"

headBobbing_enabled: "Увімкнено"
headBobbing_enabledDescription: ""

headBobbing_step: "Базова довжина кроку"
headBobbing_stepDescription: "Довжина кожного кроку (типово: 90.0)."

headBobbing_height: "Висота кроку"
headBobbing_heightDescription: "Амплітуда похитування голови (типово: 3.0)."

headBobbing_roll: "Макс. кут нахилу"
headBobbing_rollDescription: "Максимальний кут нахилу в градусах (типово: 0.2)."
