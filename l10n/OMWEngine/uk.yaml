ClassicFalloffTooltip: |-
    Типово: вимкнено
    Використовувати традиційну формулу згасання точкового світла, без раннього затемнення.

    Вада традиційної формули в тому, що вплив світла ніколи не сягає нуля.
    Це фізично точно, але може спричиняти шви освітлення, бо світло не впливає на всю сцену.
    Раннє затемнення допомагає зменшити ці шви ціною затемнення сцени.

    Morrowind використовує традиційну формулу, тож увімкніть це, якщо вам не подобаються відмінності яскравості.
    Або спробуйте змінити мінімальну яскравість приміщень.
