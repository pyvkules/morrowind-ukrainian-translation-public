LightsBoundingSphereMultiplier: "Множник обмежувальної сфери"
LightsBoundingSphereMultiplierTooltip: "Типово: 1.65\nМножник обмежувальної сфери джерел світла.\nБільші значення дають плавніше згасання, але потребують збільшення максимальної кількості джерел світла.\n\nНе впливає на освітленість чи силу світла."
LightsFadeStartMultiplier: "Множник початку згасання"
LightsFadeStartMultiplierTooltip: "Типово: 0.85\nЧастка максимальної відстані, з якої світло починає згасати.\n\nМенші значення дають повільніші переходи, більші — швидші."
LightsLightingMethodTooltip: "Задає внутрішню обробку джерел світла.\n\n
    \"Класичний\" завжди використовує 8 джерел світла на об'єкт. Результат найбільш схожий на освітлення Morrowind.\n\n
    \"Шейдери (сумісність)\" знімає обмеження у 8 джерел. Цей режим також вмикає освітлення трав'яного покриву. Рекомендовано для старішого обладнання з лімітом джерел світла близько 8.\n\n
    \"Шейдери\" має всі переваги режиму \"Шейдери (сумісність)\", але використовує сучасний підхід, що дозволяє більше джерел світла майже без втрат продуктивності на сучасному обладнанні."
LightsMaximumDistance: "Максимальна відстань світла"
LightsMaximumDistanceTooltip: "Типово: 8192\nМаксимальна відстань, на якій видно джерела світла (в ігрових одиницях).\n\nВкажіть 0, щоб зняти обмеження."
LightsMinimumInteriorBrightness: "Мін. яскравість приміщень"
LightsMinimumInteriorBrightnessTooltip: "Типово: 0.08\nМінімальна фонова яскравість приміщень.\n\nЗбільште, якщо приміщення здаються надто темними.\n\nНе діє, коли використовується класичне згасання."
MatchSunlightToSun: "Сонячне світло за сонцем"
MatchSunlightToSunTooltip: |-
    У Morrowind видиме положення сонця з загадкових причин не збігається з напрямком його світла.
    Ми зберігаємо цю нереалістичну поведінку для сумісності.

    Ця опція узгоджує положення джерела сонячного світла з положенням сонця.
