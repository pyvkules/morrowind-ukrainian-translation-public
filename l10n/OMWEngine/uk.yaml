ForcePerPixelLightingTooltip: |-
    Примусово використовувати попіксельне освітлення. Типово його використовують лише об'єкти з картами рельєфу та нормалей.

    Стосується лише об'єктів, що малюються шейдерами.

    Увімкнення дає візуальні відмінності від оригінального рушія MW, бо деякі джерела світла в Morrowind розраховані на повершинне освітлення.

    Зауважте, що шейдери трави та ефекти частинок ігнорують це налаштування.
