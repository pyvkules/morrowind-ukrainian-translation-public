name: build installer

# Робочий процес: гілка dev -> PR -> мердж у main -> реліз.
# Мердж у main збирає інсталятор і публікує його як реліз, з якого лаунчер
# користувача бачить оновлення. Версія береться з version.json, тому реліз
# створюється лише тоді, коли її справді підняли.

on:
  push:
    branches: [main]
    paths-ignore: ['**/*.md']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Read version
        id: v
        shell: pwsh
        run: |
          $v = (Get-Content version.json -Raw | ConvertFrom-Json).version
          "version=$v" >> $env:GITHUB_OUTPUT
          "tag=v$v"    >> $env:GITHUB_OUTPUT

      - name: Stop if this version is already released
        id: gate
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ steps.v.outputs.tag }}"
          $exists = gh release view $tag --repo ${{ github.repository }} 2>$null
          if ($LASTEXITCODE -eq 0) {
            "skip=true" >> $env:GITHUB_OUTPUT
            Write-Host "$tag already released - bump version.json to publish a new one"
          } else {
            "skip=false" >> $env:GITHUB_OUTPUT
          }

      - name: Install build deps
        if: steps.gate.outputs.skip == 'false'
        run: pip install pyinstaller fonttools

      - name: Sanity-check the sources
        if: steps.gate.outputs.skip == 'false'
        shell: pwsh
        run: |
          # Збірка ESM тут неможлива - ігрових даних на раннері нема і бути не
          # повинно. Перевіряємо те, що можна: тексти цілі й узгоджені між собою.
          python tools/topics/check_sources.py

      - name: Build installer and launcher
        if: steps.gate.outputs.skip == 'false'
        run: |
          pyinstaller --onefile --noconsole --name MorrowindUA-Setup installer/install.py
          pyinstaller --onefile --noconsole --name MorrowindUA installer/launcher.py

      - name: Package the update archive
        if: steps.gate.outputs.skip == 'false'
        shell: pwsh
        run: |
          # Оновлення везе тексти й рецепт, а не гру: кілька сотень кілобайт.
          $stage = "package/morrowind-ukrainian-modpack"
          New-Item -ItemType Directory -Force $stage | Out-Null
          foreach ($p in @('tools','l10n','Fonts','modpack','installer',
                           'build.py','version.json','morrowind.top',
                           'README.md','PROGRESS.md','config.example.json')) {
            Copy-Item $p -Destination $stage -Recurse -Force
          }
          Copy-Item dist/MorrowindUA.exe $stage -Force
          Compress-Archive -Path $stage -DestinationPath `
            "morrowind-ukrainian-modpack-${{ steps.v.outputs.version }}.zip" -Force

      - name: Publish release
        if: steps.gate.outputs.skip == 'false'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $notes = (Get-Content version.json -Raw | ConvertFrom-Json).highlights `
                   | ForEach-Object { "- $_" } | Out-String
          gh release create "${{ steps.v.outputs.tag }}" `
            "dist/MorrowindUA-Setup.exe" `
            "morrowind-ukrainian-modpack-${{ steps.v.outputs.version }}.zip" `
            --repo ${{ github.repository }} `
            --title "${{ steps.v.outputs.tag }}" `
            --notes $notes
